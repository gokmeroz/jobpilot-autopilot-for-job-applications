mode: review_first # review_first | full_auto

markets:
  countries: [DE, NL, IE, GB, TR]
  remote_worldwide: true

limits:
  per_country_min: 15 # discovery target, not a guarantee
  turkey_max: 50

gate:
  max_age_hours: 24
  max_yoe: 1
  languages: [EN, TR] # DE-language postings pass only if german_ok
  german_ok: true # candidate has B2 — accept German postings

score:
  threshold: 6.5
  model: claude-haiku-4-5-20251001  # fast + cheap for scoring; swap to claude-sonnet-4-6 for higher quality
  max_llm_calls_per_run: 200 # cost guard; prescore must cut volume below this

apply:
  dry_run: false  # true = fill + screenshot, never click submit
  headless: false
  max_attempts: 2
  allow_select_fallback: true  # true = choose first non-placeholder option for unknown dropdowns
  resume_file: assets/resume/resume.pdf
  cover_letter_short: assets/cover_letters/cover_letter_short.md
  cover_letter_long: assets/cover_letters/cover_letter_long.md

  # Stealth mode: activates the full anti-bot-detection stack.
  # human_like + JS evasions + playwright_stealth + realistic headers/viewport.
  # use_cdp: true is the recommended setting for all real applications.
  use_cdp: true

  # human_like: add randomized delays and mouse movements between field fills
  # to reduce bot-detection by ATS platforms. Slightly slower but much safer.
  human_like: true

paths:
  runs: runs
  history: history
  manual_queue: manual_queue
  ledger: data/ledger.sqlite

sheet:
  worksheet: "ALL APPLICATIONS"
  columns:
    [
      DATE,
      COUNTRY,
      COMPANY,
      POSITION,
      LOCATION,
      TYPE,
      SALARY,
      LANGUAGE,
      STAGE,
      SITUATION,
    ]
  stage_applied: APPLIED
  stage_queued: QUEUED
  situation_default: "ON GOING"
  country_display: # ISO2 -> sheet display value
    DE: Germany
    NL: Netherlands
    IE: Ireland
    GB: "UK / England"
    TR: Turkey
    US: USA
    REMOTE: Worldwide

ghost_after_days: 21

apify:
  actor_id: "curious_coder/linkedin-jobs-scraper"
  wellfound_actor_id: "crawlerbros/wellfound-scraper"
  timeout_secs: 300       # max seconds to wait for actor run
  pages_per_query: 1      # results per search URL (25 jobs/page)
